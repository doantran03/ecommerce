name: Deploy Payload CMS to CloudPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm run build

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: '.next,public,package.json,pnpm-lock.yaml,next.config.ts,payload.config.ts'
          target: ${{ secrets.SSH_PATH }}
          rm: false

      - name: Post-deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.SSH_PATH }}

            export PNPM_HOME="/home/${{ secrets.SSH_USER }}/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            if ! command -v pnpm &> /dev/null; then
              npm install -g pnpm
            fi

            pnpm install --prod

            pm2 reload payload-app || pm2 start npm --name "payload-app" -- start

            pm2 save
