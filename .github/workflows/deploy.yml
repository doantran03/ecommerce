name: Deploy Payload CMS to CloudPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: '.next,dist,node_modules,package.json,package-lock.json,public,next.config.js,payload.config.ts'
          target: ${{ secrets.SSH_PATH }}
          rm: false

      - name: Post-deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.SSH_PATH }}

            if [ ! -f .env ]; then
              echo "Cảnh báo: File .env không tồn tại trên server!"
            fi

            pm2 reload payload-app || pm2 start npm --name "payload-app" -- start

            pm2 save
